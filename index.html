<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teyvat Archives 2026</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        header { width: 100%; max-width: 1000px; text-align: center; }

        .main-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .main-nav button {
            background: #222; border: 1px solid #444; color: #888;
            padding: 10px 25px; border-radius: 20px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }
        .main-nav button.active { background: white; color: black; border-color: white; }

        .search-wrapper { width: 100%; max-width: 400px; margin: 0 auto 20px; }
        .search-wrapper input {
            width: 100%; background: #1a1a1a; border: 1px solid #333;
            padding: 12px; border-radius: 25px; color: white; text-align: center; outline: none;
        }

        .sub-filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .sub-filters button {
            background: #222; border: 1px solid #444; color: white;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
        }
        .sub-filters button.active { background: #ffcc00; color: black; border-color: #ffcc00; }

        .filters { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
        .filters button {
            background: #1a1a1a; border: 1px solid #333; color: #aaa;
            padding: 6px 15px; border-radius: 8px; cursor: pointer; text-transform: uppercase;
        }
        .filters button.active { background: white; color: black; border-color: white; }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; width: 100%; max-width: 1200px;
        }

        .card {
            background: #1a1a1a; border-radius: 15px; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            border: 2px solid #333; position: relative; transition: 0.3s;
        }
        .card.r-5 { border-color: #ffb13f; }
        .card.r-4 { border-color: #d28fd2; }

        .img-container { width: 100%; height: 160px; display: flex; justify-content: center; align-items: center; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-info { width: 100%; text-align: center; margin-top: 10px; }
        .type-badge {
            display: inline-block; padding: 2px 10px; border-radius: 4px;
            font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;
        }
        .bg-geo { background: #ffb83d; color: black; }
        .bg-pyro { background: #ff4b4b; color: white; }
        .bg-hydro { background: #1e90ff; color: white; }
        .bg-dendro { background: #44db44; color: black; }
        .bg-electro { background: #bc54ff; color: white; }
        .bg-cryo { background: #7df9ff; color: black; }
        .bg-anemo { background: #00fa9a; color: black; }
        .bg-weapon { background: #555; color: white; }

        h3 { margin: 5px 0 0; font-size: 0.9rem; }
        .no-data { grid-column: 1 / -1; text-align: center; color: #666; margin-top: 50px; }
    </style>
</head>

        function setElement(e, btn) { currentElement = e; setActive(btn, 'element-filters'); render(); }
        function setWeaponType(t, btn) { currentWeaponType = t; setActive(btn, 'weapon-type-filters'); render(); }
        function setCharWeapon(w, btn) { currentCharWeapon = w; setActive(btn, 'char-weapon-filters'); render(); }
        function updateSearch(v) { searchQuery = v; render(); }


        function switchTab(tab, btn) {
            currentTab = tab;
            setActive(btn, 'mainTabs');

            // Reset des filtres pour éviter les bugs
            currentRarity = 'Tous';
            currentElement = 'Tous';
            currentCharWeapon = 'Tous'
            currentWeaponType = 'Tous';

            // Affiche ou cache les menus selon l'onglet
            const ids = ['rarityFilters', 'element-filters', 'char-weapon-filters', 'weapon-type-filters'];            
            ids.forEach(id => {
                const cont = document.getElementById(id);
                if (cont) {
                    const first = cont.querySelector('button');
                    if (first) setActive(first, id);
                }
            });
            
            // Affichage des menus
            const isChar = (tab === 'chars');
            const isWep = (tab === 'weapons');
            
            document.getElementById('element-filters').style.display = isChar ? 'flex' : 'none';
            document.getElementById('char-weapon-filters').style.display = isChar ? 'flex' : 'none';
            document.getElementById('weapon-type-filters').style.display = isWep ? 'flex' : 'none'; 
            
            // Boutons d'étoiles bonus (1, 2, 3)
            const extra = [document.getElementById('btn-3-star'), document.getElementById('btn-2-star'), document.getElementById('btn-1-star')];
            extra.forEach(b => { if(b) b.style.display = isWep ? 'inline-block' : 'none' });
            
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            if (!grid) return;
            grid.innerHTML = '';

            let data = (currentTab === 'chars') ? charData : weaponData;

            const filtered = data.filter(item => {
                const matchSearch = item.n.toLowerCase().includes(searchQuery.toLowerCase());
                const matchRarity = currentRarity === 'Tous' || item.r === currentRarity;
                
                if (currentTab === 'chars') {
                    const matchElem = (currentElement === 'Tous' || item.e === currentElement)
                    const matchWep = (currentCharWeapon === 'Tous' || item.w === currentCharWeapon)
                    return matchSearch && matchRarity && matchElem && matchWep;
                } else {
                    const matchType = (currentWeaponType === 'Tous' || item.t === currentWeaponType);
                    return matchSearch && matchRarity && matchType
                }
            });
            
            if (currentTab === 'teams') {
                grid.innerHTML = '<div class="no-data">L\'onglet Teams est en cours de développement...</div>';
                return;
            }

            grid.innerHTML = filtered.map(item => {
                let imgUrl;
                if (item.fullUrl) {
                    imgUrl = item.fullUrl;
                } else {
                    const nameForUrl = (item.en || item.n).replace(/\s+/g, '_');
                    const typeFolder = (currentTab === 'chars') ? 'Character' : 'Weapon';
                    const suffix = (currentTab === 'chars') ? '_Thumb' : '';
                    imgUrl = `https://genshin-impact.fandom.com/wiki/Special:FilePath/${typeFolder}_${nameForUrl}${suffix}.png?width=250`;
                }
                
                const typeLabel = item.e || item.t;
                const typeClass = item.e ? `bg-${item.e.toLowerCase().replace('é','e')}` : 'bg-weapon';

                return `
                    <div class="card r-${item.r}">
                        <div class="rarity-badge">${item.r} ⭐</div>
                        <div class="img-container">
                            <img src="${imgUrl}" onerror="this.src='https://ui-avatars.com/api/?name=${item.n}&background=333&color=fff'">
                        </div>
                        <div class="card-info">
                            <span class="type-badge ${typeClass}">${typeLabel}</span>
                            <h3>${item.n}</h3>
                        </div>
                    </div>
                `;
            }).join('');
        }
        render();
    </script>
</body>
</html>
